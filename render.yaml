# Render Blueprint — Backend API
# Deploy: connect repo at https://dashboard.render.com → New Blueprint
#
# After deploy: add OPENROUTER_API_KEY in Render Dashboard → groweasy-api → Environment
# (never commit API keys to this file)
services:
  - type: web
    name: groweasy-api
    runtime: node
    plan: free
    buildCommand: corepack enable && pnpm install --frozen-lockfile && pnpm turbo build --filter=@groweasy/backend
    startCommand: node apps/backend/dist/index.js
    healthCheckPath: /api/v1/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: LLM_PROVIDER
        value: openrouter
      - key: LOG_LEVEL
        value: info
      - key: OPENROUTER_MODEL
        value: qwen/qwen-2.5-7b-instruct
      - key: OPENROUTER_BASE_URL
        value: https://openrouter.ai/api/v1
      - key: OPENROUTER_APP_NAME
        value: Civic Seva
      - key: CORS_ORIGIN
        value: https://groweasy-csv-importer.vercel.app,*.vercel.app
