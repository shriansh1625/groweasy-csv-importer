# Render Blueprint — Backend API
# Deploy: connect repo at https://dashboard.render.com → New Blueprint
services:
  - type: web
    name: groweasy-api
    runtime: node
    plan: free
    buildCommand: corepack enable && pnpm install --frozen-lockfile && pnpm turbo build --filter=@groweasy/backend
    startCommand: node apps/backend/dist/index.js
    healthCheckPath: /api/v1/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: LLM_PROVIDER
        value: mock
      - key: LOG_LEVEL
        value: info
      - key: CORS_ORIGIN
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
